#E:\finanzas-v2\docker-compose.yml
version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: finanzas_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-finanzas_root_2024}
      MYSQL_DATABASE: ${DB_NAME:-finanzas_v2}
      MYSQL_USER: ${DB_USER:-finanzas_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-finanzas_pass_2024}
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    volumes:
      - finanzas_mysql_data:/var/lib/mysql
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build: ./backend
    container_name: finanzas_back
    restart: always
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=finanzas_db
    ports:
      - "5001:5001"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: finanzas_front
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - backend

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: finanzas_tunnel
    restart: always
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - frontend

volumes:
  finanzas_mysql_data:
    driver: local